# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "b56b7a5d58fed0a87cddf8e04c72d889"
name = "Affiliate-Saleshq"
application_url = "https://affiliateapp.saleshq.ai"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-10"

# Lifecycle webhooks stay local so the app can manage its own session storage.
[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = [ "app/scopes_update" ]
uri = "/webhooks/app/scopes_update"

# Compliance webhooks (GDPR) must be handled by the app to pass App Store review.
[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/webhooks/gdpr"

# Order / refund / fulfillment events are delivered directly to the backend.
# The backend verifies HMAC using the app's API secret.
[[webhooks.subscriptions]]
topics = [
  "orders/create",
  "orders/paid",
  "orders/updated",
  "orders/cancelled",
  "refunds/create",
  "fulfillments/create",
  "fulfillments/update",
]
uri = "https://shopifyallinone-dkhjjaxofq-el.a.run.app/"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_fulfillments,read_orders,write_products,write_discounts,read_discounts,write_price_rules,read_price_rules,write_pixels,read_customer_events"

[auth]
redirect_urls = [ "https://affiliateapp.saleshq.ai/auth/callback" ]

[capabilities]
customer_events = true

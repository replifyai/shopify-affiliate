# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "df526699c22e3167ba9a24e0ea5e42ba"
name = "Affiliate-Saleshq"
application_url = "https://affiliateapp.saleshq.ai"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-10"

# Lifecycle webhooks stay local so the app can manage its own session storage.
[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = [ "app/scopes_update" ]
uri = "/webhooks/app/scopes_update"

# Compliance webhooks (GDPR) must be handled by the app to pass App Store review.
[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/webhooks/gdpr"

# Order / refund / fulfillment / return events are delivered directly to the backend.
# The backend verifies HMAC using the app's API secret.
# Returns drive exchange detection / commission holds (requires read_returns scope).
[[webhooks.subscriptions]]
topics = [
  "orders/create",
  "orders/paid",
  "orders/updated",
  "orders/cancelled",
  "refunds/create",
  "fulfillments/create",
  "fulfillments/update",
  "returns/approve",
  "returns/update",
  "returns/close",
  "returns/cancel",
]
uri = "https://14cgqud3x9.execute-api.ap-south-1.amazonaws.com/webhooks/shopify"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_fulfillments,read_orders,read_returns,write_products,write_discounts,read_discounts,write_price_rules,read_price_rules,write_pixels,read_customer_events"

[auth]
redirect_urls = [ "https://affiliateapp.saleshq.ai/auth/callback" ]

[capabilities]
customer_events = true

# App-owned shop metafield holding the storefront popup configuration.
# Written by the embedded admin UI (/app/settings), read by the theme app
# embed via shop.metafields["$app"].popup_config.
[shop.metafields.app.popup_config]
name = "Storefront popup configuration"
description = "Affiliate popup display and styling settings, managed in the app"
type = "json"
access.admin = "merchant_read"
access.storefront = "public_read"
